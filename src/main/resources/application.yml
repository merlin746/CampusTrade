server:
  port: 8080

spring:
  application:
    name: schoolTrade

  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/school_trade?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: "060423"

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 20MB

  jackson:
    date-format: yyyy-MM-dd HH:mm:ss
    time-zone: Asia/Shanghai

# MyBatis-Plus 配置
mybatis-plus:
  type-aliases-package: com.example.schooltrade.entity
  global-config:
    db-config:
      id-type: auto
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

# JWT 配置
jwt:
  secret: Y2FtcHVzLXRyYWRlLXNlY3JldC1rZXktZm9yLWp3dC10b2tlbi1nZW5lcmF0aW9uLTIwMjQ=
  expiration: 86400000  # 24小时 (毫秒)

# 文件上传路径
file:
  upload-path: E:/schoolTrade/uploads
  allowed-extensions: jpg,jpeg,png,gif,webp

# Knife4j API 文档
springdoc:
  swagger-ui:
    path: /doc.html
  api-docs:
    path: /v3/api-docs

# 日志级别
logging:
  level:
    com.example.schooltrade: debug
